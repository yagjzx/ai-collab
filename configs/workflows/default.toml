[workflow]
name = "default"
description = "Standard 3-model collaboration: commander + executor + verifier"

[[workflow.roles]]
role = "commander"
agent = "claude"
description = "Primary planner, architect, coordinator. Creates tasks, makes final decisions."
is_primary = true

[[workflow.roles]]
role = "executor"
agent = "codex"
description = "Code writer. Reads TASK.md, implements changes, reports results."

[[workflow.roles]]
role = "verifier"
agent = "gemini"
description = "Independent verifier. Runs commands to verify acceptance criteria. Does NOT trust executor summaries."
trust_level = "verify_only"

[workflow.review]
enabled = true
checkpoints = ["plan", "code"]
pass_threshold = 7.0
max_rounds = 3
